# GPT-OSS-20B — top-M count draft with Sub-MoE SVD subspace merging.
#
# GPT-OSS has 32 experts × top-4 routing with a long activation tail, so
# the parameter-conflict problem from naive averaging is most acute here.
# SVD alignment finds a shared subspace across the top-M experts before
# merging their V-components (Sub-MoE §3.3).
#
# M=8 (= 2× native top-k) is used to match the existing gptoss_topm_count
# baseline, allowing a clean SVD vs. no-SVD ablation at the same M.
# svd_rank=256 — GPT-OSS gate_up_proj rows ≈ 2×hidden; 256 is a safe start.
#
# Baseline for comparison:
#   gptoss_topm_count : M=8, no SVD  (label gptoss_top8_count)

model:
  id: openai/gpt-oss-20b
  dtype: bfloat16
  device_map: auto

draft:
  name: topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 4)
    M: 8
    use_svd_merge: true
    svd_rank: 256
    record_history: true
    reasoning_effort: low

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512
  reasoning_effort: low

output:
  label: gptoss_topm_count_svd
