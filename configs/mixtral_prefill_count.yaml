# Mixtral-8x7B count-weighted averaged-expert draft, frozen after prefill.
#
# The merged expert is built once from the prompt's routing distribution
# and reused unchanged for every speculative-decoding cycle of that
# question. This is the most offload-friendly merge variant — only one
# fetch episode (the prefill's expert reads) per question.

model:
  id: mistralai/Mixtral-8x7B-v0.1
  dtype: bfloat16
  device_map: auto

draft:
  name: prefill_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 2)

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: mixtral_prefill_count
