# End-to-end sanity check. NOT a real experiment — just verifies that
# install → load → patch → spec-bench → write outputs all work.
#
# Once the model is loaded (~5 min for Mixtral on first run, cached
# afterward), the actual generation finishes in well under a minute.

model:
  id: mistralai/Mixtral-8x7B-v0.1
  dtype: bfloat16
  device_map: auto

draft:
  name: count
  args:
    record_history: false           # skip the JSON dump in smoke

run:
  T: 3
  questions_per_cat: 1
  max_new_tokens: 32
  warmup: false                     # skip the prefetch warmup forward
  emit_tokens_csv: false

output:
  label: _smoke
  dir: output/_smoke
