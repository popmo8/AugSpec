# Mixtral-8x7B prefill-only count merge with a top-M cutoff.
#
# Like `prefill_count`, but before building the merged expert at prefill,
# keeps only the top-M experts by count (others zeroed, remainder
# renormalised). M defaults to count_top_k (= 2 for Mixtral).
#
# Strongest offload-friendly merge variant: only M experts ever read,
# and only once per question.

model:
  id: mistralai/Mixtral-8x7B-v0.1
  dtype: bfloat16
  device_map: auto

draft:
  name: prefill_topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 2)
    # M auto-defaults to count_top_k (= 2). Override here to e.g. 4 to
    # widen the prefill merge subset.

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: mixtral_prefill_topm_count
