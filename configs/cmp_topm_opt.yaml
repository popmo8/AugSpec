# topM ablation 有 P2+P3 — during-verify merge + EvictLayer (0 re-fetch).
# b=0.2, qpc=3, mnt=256. merged-reserve 自動（topm merge draft）→ 兩邊同預算。
model:
  id: Qwen/Qwen3-30B-A3B-Base
  backend: offload
  dtype: bfloat16
  offload:
    path: /work/morrisliu07/aug_spec/moe_infinity/offload_output/Qwen3-30B-A3B-Base
    vram_budget_ratio: 0.2
    merge_offload: true
    merge_during_verify: true
draft:
  name: topm_count
  args: {M: 32, K: 16, draft_top_k: 8, use_svd_merge: false, record_history: false}
run: {T: 5, questions_per_cat: 3, max_new_tokens: 256}
output: {label: cmp_topm_opt, dir: output/cmp_topm_opt}
