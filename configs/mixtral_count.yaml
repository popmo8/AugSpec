# Mixtral-8x7B count-weighted averaged-expert draft.
# Equivalent to thesis_experiment/.../exp_mixtral_single_countavg_specbench.py.

model:
  id: mistralai/Mixtral-8x7B-v0.1
  dtype: bfloat16
  device_map: auto

draft:
  name: count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 2)
    record_history: true

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512
  emit_tokens_csv: false

output:
  label: mixtral_count
