# GPT-OSS-20B count-weighted averaged-expert draft, frozen after prefill.

model:
  id: openai/gpt-oss-20b
  dtype: bfloat16
  device_map: auto

draft:
  name: prefill_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 4)

run:
  T: 3
  questions_per_cat: 10
  max_new_tokens: 512
  reasoning_effort: low

output:
  label: gptoss_prefill_count
