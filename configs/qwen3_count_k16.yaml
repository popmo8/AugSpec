# Qwen3-30B-A3B-Base — count draft, K=16 cluster-merged experts (no top-M, no SVD).
#
# Unlike qwen3_topm_count_k16, there is no top-M pre-filter: every expert that
# fired during the verify pass enters clustering. On Qwen3's 128-expert router
# that means the active pool is large and noisy (a long tail of <1%-mass
# experts), and the K=16 frequency-slices group ~8 originals each.
#
# Use this as the "unfiltered pool" point of the ablation against:
#   qwen3_topm_count_k16  : same K, but pool capped at M=64 first (cleaner)
#   qwen3_topm_count      : K=1 single-expert baseline

model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    K: 16           # partition all active experts into 16 cluster-merged experts
    draft_top_k: 8  # run the 8 heaviest clusters in the draft forward
    record_history: true

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: qwen3_count_k16
