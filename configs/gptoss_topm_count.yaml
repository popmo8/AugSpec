# GPT-OSS-20B count-weighted averaged-expert draft, top-M kept per cycle.
#
# M defaults to count_top_k (= 4 for GPT-OSS). Likely more impactful here
# than on Mixtral because GPT-OSS has 32 experts with a long activation
# tail — see PROGRESS.md for the bounded-fetch motivation.

model:
  id: openai/gpt-oss-20b
  dtype: bfloat16
  device_map: auto

draft:
  name: topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 4)
    # M auto-defaults to count_top_k (= 4). For ablation, set e.g. M=8.
    record_history: true

run:
  T: 3
  questions_per_cat: 10
  max_new_tokens: 512
  reasoning_effort: low

output:
  label: gptoss_topm_count
