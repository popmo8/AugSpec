# topm qpc=5, mnt=512 — same as q5_512_tm_on.yaml but within-cluster merge is
# UNIFORM (run with AUG_CLUSTER_UNIFORM=1). Cluster slicing + cross-cluster mass
# stay frequency-based; only the within-cluster combine changes. Baseline =
# q5_512_tm_on (frequency within-cluster).
model:
  id: Qwen/Qwen3-30B-A3B-Base
  backend: offload
  dtype: bfloat16
  offload:
    path: /work/morrisliu07/aug_spec/moe_infinity/offload_output/Qwen3-30B-A3B-Base
    vram_budget_ratio: 0.2
    merge_offload: true
    merge_during_verify: true
draft:
  name: topm_count
  args: {M: 32, K: 16, draft_top_k: 8, record_history: false}
run: {T: 5, questions_per_cat: 5, max_new_tokens: 512}
output: {label: q5_512_tm_unif, dir: output/q5_512_tm_unif}
