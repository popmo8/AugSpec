# Mixtral-8x7B SpecMoE: top-k routing + L2-nearest substitution.
#
# Port of thesis_experiment/.../exp_mixtral_specmoe_specbench.py.
#
# Both phases route the natural top-`route_top_k` experts (overriding
# Mixtral's native top-2). In the draft phase each winner is remapped via a
# per-layer substitute table: an in-mask winner maps to itself, an out-of-mask
# winner maps to its L2-nearest kept neighbour. The kept mask is the top-N
# most-voted experts, refreshed every verify cycle. Pairwise expert L2
# distances are computed once up front.
#
# route_top_k=1 reproduces the original top-1 SpecMoE. N sweeps the mask size
# (2/4/6 in the source experiment); make a copy per N to sweep.

model:
  id: mistralai/Mixtral-8x7B-v0.1
  dtype: bfloat16
  device_map: auto

draft:
  name: specmoe
  args:
    N: 6              # kept-mask size (top-N most-voted experts stay active)
    route_top_k: 1    # experts routed per token, both phases (native is 2)
    # count_top_k defaults to route_top_k

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: mixtral_specmoe
