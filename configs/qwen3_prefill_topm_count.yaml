# Qwen3-30B-A3B-Base prefill-only count merge with a top-M cutoff.

model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: prefill_topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    # M auto-defaults to count_top_k (= 8). For ablation try M ∈ {4, 16}.

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: qwen3_prefill_topm_count
