# Qwen3-30B-A3B-Base — prefill-only top-M count draft, K=16 cluster-merged.
#
# Prefill variant of qwen3_topm_count_k16: the K=16 cluster-merged experts
# are built ONCE from the prompt's routing distribution (captured during the
# prefill target forward) and then FROZEN — no per-cycle refresh. The draft
# forward still does gate-remap routing over those frozen clusters, so each
# token picks its own draft_top_k=8 of the 16 by its own gate.
#
# This is the most offload-friendly K variant: expert weights are read only
# once per question (right after prefill) to build the 16 merged experts.
#
# Compare against:
#   qwen3_topm_count_k16  : same K, but rebuilt every verify cycle
#   qwen3_prefill_topm_count : K=1 prefill baseline

model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: prefill_topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    M: 64           # active-expert pool (from the prompt) before clustering
    K: 16           # partition into 16 frozen cluster-merged experts
    draft_top_k: 8  # run the 8 gate-selected clusters in the draft forward

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: qwen3_prefill_topm_count_k16
