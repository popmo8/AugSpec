# Qwen3-30B-A3B-Base count-weighted averaged-expert draft, top-M per cycle.
#
# M defaults to count_top_k (= 8). Qwen3 has 128 experts × top-8 routing,
# so the bounded fetch budget is most dramatic here — without top-M the
# count tally lights up most of the 128 experts after a verify pass.

model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    # M auto-defaults to count_top_k (= 8). For ablation try M ∈ {4, 16, 32}.
    record_history: true

run:
  T: 3
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: qwen3_topm_count
