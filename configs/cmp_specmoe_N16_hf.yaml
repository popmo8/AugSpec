# Comparison run #1 — SpecMoE N=16, hf backend.
# Pairs with cmp_specmoe_N16_offload (same model/draft/run) so hf vs offload
# acceptance can be compared directly. Qwen3-30B-A3B (offload-dir model), qpc=5.

model:
  id: Qwen/Qwen3-30B-A3B
  dtype: bfloat16
  device_map: auto

draft:
  name: specmoe
  args:
    N: 16             # kept-mask size out of 128 experts
    route_top_k: 8    # native top-8

run:
  T: 5
  questions_per_cat: 5
  max_new_tokens: 256

output:
  label: cmp_specmoe_N16_hf
  dir: output/cmp_specmoe_N16_hf
