# GPT-OSS-20B prefill-only count merge with a top-M cutoff.

model:
  id: openai/gpt-oss-20b
  dtype: bfloat16
  device_map: auto

draft:
  name: prefill_topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 4)
    # M auto-defaults to count_top_k (= 4).

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512
  reasoning_effort: low

output:
  label: gptoss_prefill_topm_count
