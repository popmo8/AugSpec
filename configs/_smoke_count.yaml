# Qwen3 count-merge smoke on the hf backend — CONTROL for _smoke_offload_count.
#
# Unlike random_mask, count has real (~0.4) acceptance, so matching it across
# backends is a STRONG validation that offload's merge + verify are correct
# (M6b's random_mask both landed at ~0, which proved plumbing but not numbers).

model:
  id: Qwen/Qwen3-30B-A3B
  dtype: bfloat16
  device_map: auto

draft:
  name: count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    record_history: false

run:
  T: 3
  questions_per_cat: 1
  max_new_tokens: 32
  warmup: false

output:
  label: _smoke_count
  dir: output/_smoke_count
