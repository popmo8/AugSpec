# Qwen3-30B-A3B-Base — top-M count draft, K=16 cluster-merged experts (no SVD).
#
# Instead of collapsing the active experts into one dense expert, the top-M
# experts are partitioned into K=16 frequency-slice clusters, each merged
# independently. The draft forward runs draft_top_k=8 of those 16 (matching
# Qwen3's native num_experts_per_tok) and combines them.
#
# Motivation: merging 128→1 destroys far more functional diversity than the
# 8→1 case on Mixtral. K=16 keeps the pool diverse while bounding the draft
# fetch budget. This config isolates the effect of K from SVD alignment.
#
# Compare against:
#   qwen3_topm_count          : K=1,  no SVD  (single-expert baseline)
#   qwen3_topm_count_svd      : K=1,  SVD
#   qwen3_topm_count_svd_k16  : K=16, SVD     (full treatment)

model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    M: 32           # active-expert pool drawn before clustering
    K: 16           # partition into 16 cluster-merged experts
    draft_top_k: 8  # run the 8 heaviest clusters in the draft forward
    use_svd_merge: false
    record_history: true

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: qwen3_top32_count_k16_new
