# Qwen3-30B-A3B-Base — top-M count draft, K=16 cluster-merged experts + SVD.
#
# Full treatment: the top-M experts are partitioned into K=16 frequency-slice
# clusters, each merged via Sub-MoE SVD subspace alignment. The draft forward
# runs draft_top_k=8 of the 16 clusters (= Qwen3's native top-8 routing).
#
# 2x2 ablation grid (run all four for a clean comparison):
#   K=1  / no SVD : qwen3_topm_count
#   K=1  / SVD    : qwen3_topm_count_svd
#   K=16 / no SVD : qwen3_topm_count_k16
#   K=16 / SVD    : qwen3_topm_count_svd_k16   <- this file

model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    M: 64           # active-expert pool drawn before clustering
    K: 16           # partition into 16 cluster-merged experts (~4 originals each)
    draft_top_k: 8  # run the 8 heaviest clusters in the draft forward
    use_svd_merge: true
    svd_rank: 256
    record_history: true

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: qwen3_topm_count_svd_k16
