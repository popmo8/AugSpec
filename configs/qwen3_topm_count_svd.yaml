# Qwen3-30B-A3B-Base — top-M count draft with Sub-MoE SVD subspace merging.
#
# Qwen3 has 128 experts × top-8 routing; without top-M the count tally
# lights up most of the 128 experts after a verify pass, so top-M is
# especially important here.  SVD alignment aligns the M surviving experts
# into a shared subspace before V-merging (Sub-MoE §3.3).
#
# M=8 matches the model's native top-k (num_experts_per_tok=8).
# svd_rank=256 — Qwen3-30B-A3B hidden_size=3072; 256 ≈ 8% of input dim.
# Raise to 512 if you observe quality degradation vs. plain topm_count.
#
# Baseline for comparison:
#   qwen3_topm_count : M=8 (default), no SVD

model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: topm_count
  args:
    # count_top_k auto-defaults to model.config.num_experts_per_tok (= 8)
    M: 8
    use_svd_merge: true
    svd_rank: 256
    record_history: true

run:
  T: 5
  questions_per_cat: 10
  max_new_tokens: 512

output:
  label: qwen3_topm_count_svd
