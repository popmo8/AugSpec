# 四方對比（Base 模型）#1 — SpecMoE N=16, hf backend.
# model = Qwen3-30B-A3B-Base, qpc=3, max_new_tokens=256.
model:
  id: Qwen/Qwen3-30B-A3B-Base
  dtype: bfloat16
  device_map: auto

draft:
  name: specmoe
  args:
    N: 16
    route_top_k: 8

run:
  T: 5
  questions_per_cat: 3
  max_new_tokens: 256

output:
  label: base_specmoe_hf
  dir: output/base_specmoe_hf
