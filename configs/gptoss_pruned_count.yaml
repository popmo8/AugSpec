# GPT-OSS-20B count-weighted, then cumulative-frequency pruned (0.9).

model:
  id: openai/gpt-oss-20b
  dtype: bfloat16
  device_map: auto

draft:
  name: pruned_count
  args:
    cumulative_threshold: 0.9
    record_history: true

run:
  T: 3
  questions_per_cat: 10
  max_new_tokens: 512
  reasoning_effort: low

output:
  label: gptoss_pruned_count
