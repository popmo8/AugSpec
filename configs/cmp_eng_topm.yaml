# Same-engine comparison — topM merged draft via dispatch_merged_local (the
# archer MoEMLP::forward kernel, identical to SpecMoE's draft execution) @ b=0.2,
# qpc=5, mnt=512. P2+P3 (during-verify merge + evict), NO P1 flush (redundant
# with merged-reserve and triggers the Enqueue evict race). Default backend =
# dispatch (do NOT set AUG_MERGED_BACKEND).
model:
  id: Qwen/Qwen3-30B-A3B-Base
  backend: offload
  dtype: bfloat16
  offload:
    path: /work/morrisliu07/aug_spec/moe_infinity/offload_output/Qwen3-30B-A3B-Base
    vram_budget_ratio: 0.2
    merge_offload: true
    merge_during_verify: true     # P2 evict + P3 during-verify merge
draft:
  name: topm_count
  args: {M: 32, K: 16, draft_top_k: 8, record_history: false}
run: {T: 5, questions_per_cat: 5, max_new_tokens: 512}
output: {label: cmp_eng_topm, dir: output/cmp_eng_topm}
